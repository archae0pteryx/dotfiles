general {
  output_format = "i3bar"
  colors = true
  color_good = "#00FF00"
  color_degraded = "#FFFF00"
  color_bad = "#FF0000"
}
#order += "ethernet eth0"
#order += "wireless wlan0"
#order += "wireless wlan1"
#order += "load"
order += "cpu_usage"
#order += "cpu_temperature 0"
#order += "disk /"
#order += "battery 0"
#order += "volume master"
#order += "time"

battery 0 {
  last_full_capacity = true
  # format = "ΎΜΠ%status %percentage"
  format = "ΎΜΠ%percentage"
  path = "/sys/class/power_supply/CMB0/uevent"
}

ethernet eth0 {
# if you use %speed, i3status requires root privileges
  format_up = "ΎΒο eth0έΑΖ ΎΑΤ %quality ΎΔρ %essid ΎΔυ  %bitrate ΎΒΒ %ip"
  format_down = ""
}

wireless wlan0 {
  format_up = "ΎΝΖwlan0έΑΖ ΎΑΤ %quality ΎΔρ %essid ΎΔυ  %bitrate ΎΒΒ %ip"
  # format_down = "ΎΝΖwlan0 ΎΒη"
  format_down = ""
}

wireless wlan1 {
  format_up = "ΎΝΖwlan1έΑΖΎΑΤ %quality ΎΔρ %essid ΎΔυ  %bitrate ΎΒΒ %ip"
  # format_down = "ΎΝΖwlan1 ΎΒη"
  format_down = ""
}

time {
  format = "ΎΑΩ %a, %d %b %H:%M"
}

load {
  format = "ΎΜγ%1min"
}

cpu_usage {
  format = "ΎΔν   %usage  "
}

cpu_temperature 0 {
  format = "ΎΛ╢%degrees ┬░C"
  max_threshold = "65"
}

disk "/" {
  format = "ΎΓι έΑΔ%free %avail"
}

volume master {
  format = "ΎΑρ %volume"
  format_muted = "ΎΑο %volume"
  device = "default"
  mixer = "Master"
  mixer_idx = 0
}

